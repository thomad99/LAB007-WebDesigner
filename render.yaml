services:
  - type: web
    name: lab007-website-cloner
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: website-cloner-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
    autoDeploy: true

databases:
  - name: website-cloner-db
    databaseName: website_cloner
    user: website_cloner
    plan: free 